###############################################################################
# Hyprland Configuration
# Author: Man37
# Combined configuration file with clean formatting
###############################################################################

# ═════════════════════════════════════════════════════════════════════════════
# VARIABLES
# ═════════════════════════════════════════════════════════════════════════════

$mainMod     = SUPER
$term        = foot
$files       = pcmanfm
$scriptsDir  = $HOME/.config/hypr/scripts
$UserScripts = $HOME/.config/hypr/UserScripts
$configs     = $HOME/.config/hypr/configs
$UserConfigs = $HOME/.config/hypr/UserConfigs
$rofiDir     = $HOME/.config/rofi
$wallDIR     = $HOME/Pictures/wallpapers


# ═════════════════════════════════════════════════════════════════════════════
# ENVIRONMENT VARIABLES
# ═════════════════════════════════════════════════════════════════════════════

env = EDITOR, nvim

# Display backends
env = CLUTTER_BACKEND, wayland
env = GDK_BACKEND, wayland,x11
env = QT_QPA_PLATFORM, wayland;xcb
env = XDG_SESSION_TYPE, wayland
env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_DESKTOP, Hyprland

# Qt configuration
env = QT_AUTO_SCREEN_SCALE_FACTOR, 1
env = QT_SCALE_FACTOR, 1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION, 1
env = QT_QPA_PLATFORMTHEME, qt5ct
env = QT_QPA_PLATFORMTHEME, qt6ct

# Cursor
env = XCURSOR_THEME, Bibata-Modern-Ice
env = XCURSOR_SIZE, 27

# Scaling
env = GDK_SCALE, 0.85

# Electron / Firefox
env = ELECTRON_OZONE_PLATFORM_HINT, auto
env = MOZ_ENABLE_WAYLAND, 1


# ═════════════════════════════════════════════════════════════════════════════
# MONITORS
# ═════════════════════════════════════════════════════════════════════════════

monitor = eDP-1, 1920x1080@60, 0x0, 1
monitor = HDMI-A-1, 1366x768@59.79, 1920x0, 0.67


# ═════════════════════════════════════════════════════════════════════════════
# AUTOSTART
# ═════════════════════════════════════════════════════════════════════════════

# Core system
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = hyprpm reload -n
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1 &
exec-once = $scriptsDir/Polkit.sh

# Wallpaper
exec-once = awww-daemon

# Status bar & notifications
exec-once = waybar &
exec-once = playerctld daemon
exec-once = hyprpanel
exec-once = mako

# Utilities
exec-once = $scriptsDir/battery_notification.sh
exec-once = hypridle &
# exec-once = gammastep -O 10000

# Clipboard manager
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
# exec-once = wl-clip-persist --clipboard both


# ═════════════════════════════════════════════════════════════════════════════
# THEME & COLORS
# ═════════════════════════════════════════════════════════════════════════════

source = $HOME/.config/hypr/wallust/wallust-hyprland.conf


# ═════════════════════════════════════════════════════════════════════════════
# GENERAL SETTINGS
# ═════════════════════════════════════════════════════════════════════════════

general {
    border_size          = 0
    gaps_in              = 5
    gaps_out             = 25
    resize_on_border     = true
    layout               = dwindle
}


# ═════════════════════════════════════════════════════════════════════════════
# DECORATIONS
# ═════════════════════════════════════════════════════════════════════════════

decoration {
    active_opacity       = 0.9
    inactive_opacity     = 0.7
    fullscreen_opacity   = 1.0
    dim_inactive         = true
    dim_strength         = 0.1
    dim_special          = 0.8

    blur {
        enabled          = true
        size             = 2
        passes           = 4
        brightness       = 1.0
        contrast         = 1.0
        popups           = true
        ignore_opacity   = true
        new_optimizations = true
        special          = true
        xray             = false
    }
}


# ═════════════════════════════════════════════════════════════════════════════
# ANIMATIONS
# ═════════════════════════════════════════════════════════════════════════════

animations {
    enabled = yes

    # Bezier curves
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    bezier = been, 0.24, 0.9, 0.25, 0.91
    bezier = been2, 0.0, 0.94, 0.5, 0.99
    bezier = menu_decel, 0.1, 1.0, 0.0, 1.0
    bezier = linear, 0.0, 0.0, 1.0, 1.0
    bezier = wind, 0.05, 0.9, 0.1, 1.05
    bezier = winIn, 0.1, 1.1, 0.1, 1.1
    bezier = winOut, 0.3, -0.3, 0.0, 1.0
    bezier = slow, 0.0, 0.85, 0.3, 1.0
    bezier = overshot, 0.7, 0.6, 0.1, 1.1
    bezier = bounce, 1.1, 1.6, 0.1, 0.85
    bezier = sligshot, 1.0, -1.0, 0.15, 1.25
    bezier = nice, 0.0, 6.9, 0.5, -4.2

    # Window animations
    animation = windowsIn, 1, 6, myBezier, popin 1%
    animation = windowsOut, 1, 6, myBezier, popin 10%
    animation = windowsMove, 1, 5, wind, slide
    animation = windows, 1, 6, myBezier, popin
    animation = border, 1, 1, linear
    animation = fade, 1, 6, myBezier
    animation = workspaces, 1, 2, wind
}


# ═════════════════════════════════════════════════════════════════════════════
# LAYOUTS
# ═════════════════════════════════════════════════════════════════════════════

dwindle {
    pseudotile           = yes
    preserve_split       = yes
    special_scale_factor = 0.8
}

master {
    new_status = master
    new_on_top = 1
    mfact      = 0.5
}


# ═════════════════════════════════════════════════════════════════════════════
# INPUT
# ═════════════════════════════════════════════════════════════════════════════

input {
    kb_layout                   = us
    repeat_rate                 = 40
    repeat_delay                = 250
    sensitivity                 = 0
    numlock_by_default          = true
    left_handed                 = false
    follow_mouse                = true
    float_switch_override_focus = false

    touchpad {
        disable_while_typing    = true
        clickfinger_behavior    = false
        middle_button_emulation = true
        tap-to-click            = true
        drag_lock               = false
    }
}


# ═════════════════════════════════════════════════════════════════════════════
# GESTURES
# ═════════════════════════════════════════════════════════════════════════════

gesture = 3, horizontal, workspace,
gesture = 3, swipe, mod:ALT, resize


# ═════════════════════════════════════════════════════════════════════════════
# GROUPS
# ═════════════════════════════════════════════════════════════════════════════

group {
    groupbar {
    }
}


# ═════════════════════════════════════════════════════════════════════════════
# MISCELLANEOUS
# ═════════════════════════════════════════════════════════════════════════════

misc {
    disable_hyprland_logo      = true
    disable_splash_rendering   = true
    vfr                        = true
    vrr                        = 0
    mouse_move_enables_dpms    = true
    enable_swallow             = true
    swallow_regex              = ^(kitty)$
    focus_on_activate          = false
    initial_workspace_tracking = 0
    middle_click_paste         = false
}


# ═════════════════════════════════════════════════════════════════════════════
# BINDS CONFIG
# ═════════════════════════════════════════════════════════════════════════════

binds {
    workspace_back_and_forth = true
    allow_workspace_cycles   = true
    pass_mouse_when_bound    = false
    movefocus_cycles_fullscreen = true
}


# ═════════════════════════════════════════════════════════════════════════════
# XWAYLAND
# ═════════════════════════════════════════════════════════════════════════════

xwayland {
    enabled            = true
    force_zero_scaling = true
}


# ═════════════════════════════════════════════════════════════════════════════
# CURSOR
# ═════════════════════════════════════════════════════════════════════════════

cursor {
    no_hardware_cursors      = false
    enable_hyprcursor        = true
    warp_on_change_workspace = true
    no_warps                 = true
}


# ═════════════════════════════════════════════════════════════════════════════
# LAYER RULES
# ═════════════════════════════════════════════════════════════════════════════

layerrule = animation slide, match:namespace ^rofi$


# ═════════════════════════════════════════════════════════════════════════════
# WINDOW RULES
# ═════════════════════════════════════════════════════════════════════════════

# windowrulev2 = float, class:^(floatkitty)$
# windowrulev2 = size 800 500, class:^(floatkitty)$
# windowrulev2 = center, class:^(floatkitty)$

windowrule = float on, match:class clipmenu
windowrule = center on, match:class clipmenu
windowrule = size 1500 600, match:class clipmenu

# ═════════════════════════════════════════════════════════════════════════════
# PLUGINS
# ═════════════════════════════════════════════════════════════════════════════

plugin {
    hyprexpo {
        columns          = 3
        gap_size         = 5
        bg_col           = rgb(111111)
        workspace_method = center current
        enable_gesture   = true
        # gesture_distance = 200
        # gesture_positive = false
    }
}


# ═════════════════════════════════════════════════════════════════════════════
# KEYBINDINGS
# ═════════════════════════════════════════════════════════════════════════════

# ─────────────────────────────────────────────────────────────────────────────
# System Control
# ─────────────────────────────────────────────────────────────────────────────

bind = CTRL ALT, Delete, exec, hyprctl dispatch exit 0
bind = CTRL ALT, L, exec, $scriptsDir/LockScreen.sh
bind = CTRL ALT, P, exec, $scriptsDir/Wlogout.sh


# ─────────────────────────────────────────────────────────────────────────────
# Application Launchers
# ─────────────────────────────────────────────────────────────────────────────

bind = $mainMod, Return, exec, $term
bind = $mainMod, T, exec, $files
bind = $mainMod, N, exec, kitty nvim
bind = $mainMod, D, exec, sh -c "tofi-drun | sh"
bind = $mainMod, E, exec, rofimoji
bind = SUPER+SHIFT, Return, exec, kitty --class floatkitty

# bind = $mainMod, left,  movefocus, l
# bind = $mainMod, right, movefocus, r
# bind = $mainMod, up,    movefocus, u
# bind = $mainMod, down,  movefocus, d

# ─────────────────────────────────────────────────────────────────────────────
# Window Management
# ─────────────────────────────────────────────────────────────────────────────

bind = $mainMod, Q, killactive
bind = $mainMod SHIFT, Q, exec, $scriptsDir/KillActiveProcess.sh
bind = $mainMod, F, fullscreen,
bind = $mainMod ALT, F, fullscreen,1
bind = $mainMod SHIFT, F, togglefloating
bind = $mainMod CTRL, F, exec, hyprctl dispatch workspaceopt allfloat
bind = ALT, Tab, cyclenext
bind = SUPER, P, pin
bind = SUPER, Tab, workspace, previous


# ─────────────────────────────────────────────────────────────────────────────
# Window Grouping
# ─────────────────────────────────────────────────────────────────────────────

bind = $mainMod, G, togglegroup
bind = $mainMod CTRL, tab, changegroupactive


# ─────────────────────────────────────────────────────────────────────────────
# Features & Utilities
# ─────────────────────────────────────────────────────────────────────────────

bind = $mainMod ALT, R, exec, $scriptsDir/Refresh.sh
# bind = $mainMod ALT, V, exec, cliphist list | rofi -dmenu -theme ~/.config/rofi/themes/rofi-cliphist.rasi -p "Clipboard:" | cliphist decode | wl-copy
bind = $mainMod ALT, V, exec, foot --app-id clipmenu -e sh -c 'cliphist list | fzf --layout=reverse --border --preview "cliphist decode {1}" --preview-window=right:55% --bind "enter:execute(cliphist decode {1} | wl-copy)+abort"'
bind = $mainMod, R, exec, ~/.config/waybar/scripts/timer.sh menu
bind = $mainMod SHIFT, N, exec, swaync-client -t -sw
bind = $mainMod, W, exec, ~/.config/rofi/scripts/wallpaper.sh
bind = $mainMod, B, exec, pkill -SIGUSR1 waybar
bind = $mainMod SHIFT, S, exec, $scriptsDir/ScreenShot.sh --swappy
bind = , XF86Calculator, exec, rofi -show calc -modi calc -no-show-match -no-sort
bind = , F9, hyprexpo:expo, toggle


# ─────────────────────────────────────────────────────────────────────────────
# Media Controls
# ─────────────────────────────────────────────────────────────────────────────

bind = , XF86AudioPlay, exec, $scriptsDir/MediaCtrl.sh --pause
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86MonBrightnessDown, exec, brightnessctl set 10%-
bind = , XF86MonBrightnessUp, exec, brightnessctl set +10%


# ─────────────────────────────────────────────────────────────────────────────
# Layout: Dwindle
# ─────────────────────────────────────────────────────────────────────────────

bind = $mainMod SHIFT, I, togglesplit
bind = $mainMod, P, pseudo


# ─────────────────────────────────────────────────────────────────────────────
# Layout: Master
# ─────────────────────────────────────────────────────────────────────────────

bind = $mainMod CTRL, D, layoutmsg, removemaster
bind = $mainMod, I, layoutmsg, addmaster
bind = $mainMod, J, layoutmsg, cyclenext
bind = $mainMod, K, layoutmsg, cycleprev
bind = $mainMod CTRL, Return, layoutmsg, swapwithmaster


# ─────────────────────────────────────────────────────────────────────────────
# Layout: General
# ─────────────────────────────────────────────────────────────────────────────

bind = $mainMod, M, exec, hyprctl dispatch splitratio 0.3


# ─────────────────────────────────────────────────────────────────────────────
# Window Resizing
# ─────────────────────────────────────────────────────────────────────────────

binde = $mainMod SHIFT, left, resizeactive, -50 0
binde = $mainMod SHIFT, right, resizeactive, 50 0
binde = $mainMod SHIFT, up, resizeactive, 0 -50
binde = $mainMod SHIFT, down, resizeactive, 0 50


# ─────────────────────────────────────────────────────────────────────────────
# Window Moving
# ─────────────────────────────────────────────────────────────────────────────

bind = $mainMod CTRL, left, movewindow, l
bind = $mainMod CTRL, right, movewindow, r
bind = $mainMod CTRL, up, movewindow, u
bind = $mainMod CTRL, down, movewindow, d


# ─────────────────────────────────────────────────────────────────────────────
# Focus Management
# ─────────────────────────────────────────────────────────────────────────────

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d


# ─────────────────────────────────────────────────────────────────────────────
# Workspace Management
# ─────────────────────────────────────────────────────────────────────────────

# Switch to workspace 1-10
bind = $mainMod, code:10, workspace, 1
bind = $mainMod, code:11, workspace, 2
bind = $mainMod, code:12, workspace, 3
bind = $mainMod, code:13, workspace, 4
bind = $mainMod, code:14, workspace, 5
bind = $mainMod, code:15, workspace, 6
bind = $mainMod, code:16, workspace, 7
bind = $mainMod, code:17, workspace, 8
bind = $mainMod, code:18, workspace, 9
bind = $mainMod, code:19, workspace, 10

# Move window to workspace 1-10
bind = $mainMod SHIFT, code:10, movetoworkspace, 1
bind = $mainMod SHIFT, code:11, movetoworkspace, 2
bind = $mainMod SHIFT, code:12, movetoworkspace, 3
bind = $mainMod SHIFT, code:13, movetoworkspace, 4
bind = $mainMod SHIFT, code:14, movetoworkspace, 5
bind = $mainMod SHIFT, code:15, movetoworkspace, 6
bind = $mainMod SHIFT, code:16, movetoworkspace, 7
bind = $mainMod SHIFT, code:17, movetoworkspace, 8
bind = $mainMod SHIFT, code:18, movetoworkspace, 9
bind = $mainMod SHIFT, code:19, movetoworkspace, 10
bind = $mainMod SHIFT, bracketleft, movetoworkspace, -1
bind = $mainMod SHIFT, bracketright, movetoworkspace, +1

# Move window silently to workspace 1-10
bind = $mainMod CTRL, code:10, movetoworkspacesilent, 1
bind = $mainMod CTRL, code:11, movetoworkspacesilent, 2
bind = $mainMod CTRL, code:12, movetoworkspacesilent, 3
bind = $mainMod CTRL, code:13, movetoworkspacesilent, 4
bind = $mainMod CTRL, code:14, movetoworkspacesilent, 5
bind = $mainMod CTRL, code:15, movetoworkspacesilent, 6
bind = $mainMod CTRL, code:16, movetoworkspacesilent, 7
bind = $mainMod CTRL, code:17, movetoworkspacesilent, 8
bind = $mainMod CTRL, code:18, movetoworkspacesilent, 9
bind = $mainMod CTRL, code:19, movetoworkspacesilent, 10
bind = $mainMod CTRL, bracketleft, movetoworkspacesilent, -1
bind = $mainMod CTRL, bracketright, movetoworkspacesilent, +1

# Scroll through workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bind = $mainMod, period, workspace, e+1
bind = $mainMod, comma, workspace, e-1

# Special workspace
bind = $mainMod SHIFT, U, movetoworkspace, special
bind = $mainMod, U, togglespecialworkspace
bind = SUPER, grave, workspace, emptyn


# ─────────────────────────────────────────────────────────────────────────────
# Mouse Bindings
# ─────────────────────────────────────────────────────────────────────────────

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
